version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: store_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: store_db
    ports:
      - "5432:5432"
    volumes:
      - store_data:/var/lib/postgresql/data

# Declaração do volume nomeado
volumes:
  store_data:
